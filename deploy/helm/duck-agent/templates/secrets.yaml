apiVersion: v1
kind: Secret
metadata:
  name: azure-ai-secret
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
type: Opaque
data:
  api_key: {{ required "azureAiApiKey is required (--set azureAiApiKey=<value>)" .Values.azureAiApiKey | b64enc }}
  api_base: {{ required "azureAiApiBase is required (--set azureAiApiBase=<value>)" .Values.azureAiApiBase | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: azure-files-secret
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
type: Opaque
data:
  azurestorageaccountname: {{ required "storage.accountName is required" .Values.storage.accountName | b64enc }}
  azurestorageaccountkey: {{ required "storage.accountKey is required" .Values.storage.accountKey | b64enc }}
