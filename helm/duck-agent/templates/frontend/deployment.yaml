apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      {{- include "duck-agent.selectorLabels" "frontend" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "duck-agent.selectorLabels" "frontend" | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      initContainers:
        - name: wait-for-agent
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://agent:{{ .Values.agent.port }}/openapi.json > /dev/null 2>&1; do
                echo "waiting for agent..."; sleep 10
              done
      containers:
        - name: frontend
          image: {{ include "duck-agent.image" (dict "registry" .Values.image.registry "repo" .Values.frontend.image.repository "tag" .Values.frontend.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          env:
            - name: AGENT_URL
              value: http://agent:{{ .Values.agent.port }}/
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
