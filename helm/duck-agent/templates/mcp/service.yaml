apiVersion: v1
kind: Service
metadata:
  name: mcp
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  selector:
    {{- include "duck-agent.selectorLabels" "mcp" | nindent 4 }}
  ports:
    - port: {{ .Values.mcp.port }}
      targetPort: {{ .Values.mcp.port }}
      protocol: TCP
