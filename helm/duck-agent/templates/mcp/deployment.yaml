apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      {{- include "duck-agent.selectorLabels" "mcp" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "duck-agent.selectorLabels" "mcp" | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      initContainers:
        - name: wait-for-embeddings
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://embeddings:{{ .Values.embeddings.port }}/docs > /dev/null 2>&1; do
                echo "waiting for embeddings..."; sleep 10
              done
      containers:
        - name: mcp
          image: {{ include "duck-agent.image" (dict "registry" .Values.image.registry "repo" .Values.mcp.image.repository "tag" .Values.mcp.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "mcp_server.py"]
          ports:
            - containerPort: {{ .Values.mcp.port }}
          env:
            - name: DB_PATH
              value: /data/academic.duckdb
            - name: EMBEDDING_SERVICE_URL
              value: http://embeddings:{{ .Values.embeddings.port }}
            - name: MCP_PORT
              value: {{ .Values.mcp.port | quote }}
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mcp.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mcp.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          volumeMounts:
            - name: duckdb
              mountPath: /data
      volumes:
        - name: duckdb
          persistentVolumeClaim:
            claimName: duckdb-pvc
