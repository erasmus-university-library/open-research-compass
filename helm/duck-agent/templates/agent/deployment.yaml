apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      {{- include "duck-agent.selectorLabels" "agent" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "duck-agent.selectorLabels" "agent" | nindent 8 }}
    spec:
      {{- if .Values.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      {{- end }}
      initContainers:
        - name: wait-for-mcp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mcp {{ .Values.mcp.port }}; do
                echo "waiting for mcp..."; sleep 10
              done
      containers:
        - name: agent
          image: {{ include "duck-agent.image" (dict "registry" .Values.image.registry "repo" .Values.agent.image.repository "tag" .Values.agent.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.agent.port }}
          env:
            - name: AZURE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: azure-ai-secret
                  key: api_key
            - name: AZURE_AI_API_BASE
              valueFrom:
                secretKeyRef:
                  name: azure-ai-secret
                  key: api_base
            - name: AZ_MODEL
              value: {{ .Values.azModel }}
            - name: MCP_URL
              value: http://mcp:{{ .Values.mcp.port }}/sse
          resources:
            {{- toYaml .Values.agent.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /openapi.json
              port: {{ .Values.agent.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /openapi.json
              port: {{ .Values.agent.port }}
            initialDelaySeconds: 40
            periodSeconds: 20
            failureThreshold: 5
