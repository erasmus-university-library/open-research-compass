apiVersion: v1
kind: Service
metadata:
  name: embeddings
  namespace: {{ include "duck-agent.namespace" . }}
  labels:
    {{- include "duck-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: embeddings
spec:
  type: ClusterIP
  selector:
    {{- include "duck-agent.selectorLabels" "embeddings" | nindent 4 }}
  ports:
    - port: {{ .Values.embeddings.port }}
      targetPort: {{ .Values.embeddings.port }}
      protocol: TCP
